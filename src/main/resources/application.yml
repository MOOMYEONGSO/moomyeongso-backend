server:
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
refresh:
  expiration: 1209600000

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  post-images:
    max-images-per-post: 5
    max-file-size-bytes: 10485760
    thumbnail-size: 512
    temporary-retention-hours: 24
    deleted-retention-days: 7

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 55MB
  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true

logging:
  level:
    root: info

swagger:
  username: ${SWAGGER_USERNAME}
  password: ${SWAGGER_PASSWORD}

security:
  jwt:
    ignore-paths:
      - /auth/anonymous
      - /auth/reissue
      - /notifications/metrics/today
    optional-auth-paths:
      - /auth/login
      - /auth/signup

discord:
  webhook:
    url: ${DISCORD_WEBHOOK_URL}

cloud:
  aws:
    region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${AWS_S3_BUCKET:}
      public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
      original-prefix: posts/original
      thumbnail-prefix: posts/thumbnails
